# Remap prefix to C-a
unbind C-a
set-option -g prefix C-a
bind-key C-a send-prefix

# Remap split to | and -
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Reload config
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf"

# Pane navigation
unbind h
unbind j
unbind k
unbind l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# "unbind" esc
set -s escape-time 0

# no rename window
set-option -g allow-rename off

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g mode-style 'fg=colour2 bg=colour16 bold'

# panes
set -g pane-border-style 'fg=colour2 bg=colour16'
set -g pane-active-border-style 'fg=colour16 bg=colour2'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour234 fg=colour2 dim'
set -g status-left ''
set -g status-right ''
set -g status-right-length 50
set -g status-left-length 20

# current window
setw -g window-status-current-style 'fg=colour0 bg=colour2 bold'
setw -g window-status-current-format ' #I#[fg=colour234]:#[fg=colour0]#W#[fg=colour0]#F '

# other windows
setw -g window-status-style 'fg=colour0 bg=colour100'
setw -g window-status-format ' #I#[fg=colour0]:#[fg=colour0]#W#[fg=colour0]#F '

setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# messages/rename
set -g message-style 'fg=colour5 bg=colour234 bold'
